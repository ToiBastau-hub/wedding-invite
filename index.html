<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Асылжан & Юлдуз</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Cormorant+Garamond:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Cormorant Garamond',serif;
  background:#000;
  color:#fff;
}

/* FULLSCREEN */
.section{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  position:relative;
}

/* BACKGROUND */
.bg{
  position:absolute;
  inset:0;
  background-size:cover;
  background-position:center;
}

/* OVERLAY (ВОТ ЧЕГО У ТЕБЯ НЕ БЫЛО) */
.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.8));
}

/* TEXT */
.title{
  font-family:'Playfair Display',serif;
  font-size:42px;
}

.names{
  font-family:'Great Vibes',cursive;
  font-size:38px;
}

/* FADE */
.fade{
  opacity:0;
  transform:translateY(40px);
  transition:1s;
}

.fade.show{
  opacity:1;
  transform:translateY(0);
}

/* MUSIC */
.music{
  position:absolute;
  left:20px;
  bottom:120px;
  width:80px;
  height:80px;
  border-radius:50%;
  border:1px solid #fff;
}

/* GLASS */
.glass{
  background:rgba(255,255,255,0.9);
  color:#000;
  padding:30px;
  border-radius:30px;
}

</style>
</head>

<body>

<!-- HERO -->
<section class="section">
  <div class="bg" style="background-image:url('assets/hero.jpg')"></div>
  <div class="overlay"></div>

  <div class="fade">
    <div class="title">WEDDING</div>
    <div class="names">Асылжан & Юлдуз</div>
  </div>
</section>

<!-- TEXT -->
<section class="section" style="background:#8c7766">
  <div class="fade">
    <h2>10 мая 2026</h2>
    <p>Приглашаем вас на нашу свадьбу</p>
  </div>
</section>

<!-- PLACE -->
<section class="section" style="background:#fff;color:#000">
  <div class="fade">
    <h2>Gulvar Banquet Hall</h2>
    <p>Алматы, Казыбек би 43</p>
    <div id="timer"></div>
  </div>
</section>

<!-- IMAGE -->
<section class="section">
  <div class="bg" style="background-image:url('assets/couple.jpg')"></div>
  <div class="overlay"></div>
</section>

<!-- FORM -->
<section class="section">
  <div class="glass">
    <input id="name" placeholder="Ваше имя"><br>
    <button onclick="send()">Отправить</button>
  </div>
</section>

<!-- LAST -->
<section class="section">
  <div class="bg" style="background-image:url('assets/last.jpg')"></div>
  <div class="overlay"></div>
</section>

<audio id="music" src="assets/music.mp3"></audio>

<script>

/* FADE */
const obs=new IntersectionObserver(e=>{
e.forEach(i=>{
if(i.isIntersecting)i.target.classList.add('show');
});
});
document.querySelectorAll('.fade').forEach(el=>obs.observe(el));

/* TIMER */
const date=new Date("May 10, 2026 16:30").getTime();

setInterval(()=>{
const now=new Date().getTime();
const d=date-now;

document.getElementById("timer").innerHTML=Math.floor(d/86400000)+" дней";
},1000);

/* FORM */
function send(){
const name=document.getElementById("name").value;
window.open(`https://wa.me/77777777777?text=Имя:${name}`);
}

</script>

</body>
</html>
